name: CI

on:
  push:
    branches: ["main", "master"]
    paths-ignore: ["**.md", "docs/**"]
  pull_request:
    branches: ["main", "master"]
    paths-ignore: ["**.md", "docs/**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Vet
        run: go vet ./...
