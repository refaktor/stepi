name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: ""     }
          - { goos: linux,   goarch: arm64, suffix: ""     }
          - { goos: darwin,  goarch: amd64, suffix: ""     }
          - { goos: darwin,  goarch: arm64, suffix: ""     }
          - { goos: windows, goarch: amd64, suffix: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build stepi
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/stepi-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt && cat checksums.txt

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- Initial release")

          cat > release_notes.md <<EOF
          ## What's Changed

          ${CHANGELOG}

          ## Downloads

          | Platform            | Binary                                                                  |
          | ------------------- | ----------------------------------------------------------------------- |
          | Linux x86-64        | \`stepi-${{ github.ref_name }}-linux-amd64\`                            |
          | Linux ARM64         | \`stepi-${{ github.ref_name }}-linux-arm64\`                            |
          | macOS x86-64        | \`stepi-${{ github.ref_name }}-darwin-amd64\`                           |
          | macOS Apple Silicon | \`stepi-${{ github.ref_name }}-darwin-arm64\`                           |
          | Windows x86-64      | \`stepi-${{ github.ref_name }}-windows-amd64.exe\`                      |

          A \`checksums.txt\` (SHA-256) is included for verification.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
